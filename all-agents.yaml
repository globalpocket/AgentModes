      - 失敗時の固定形式には必要に応じて `Failure Class` と `Expected Red Match` を追加できますが、修正先モード名や修正手順は書いてはいけません。
      - `Expected vs Received` は最大2件、各1行に圧縮してください。長いdiff、スタックトレース全文、npm notice、解決済みログは出力してはいけません。
      - 原因推定や修正案は書かず、観測事実だけを返してください。Anti-Pattern と Fix Direction の抽出は Orchestrator が担当します。
